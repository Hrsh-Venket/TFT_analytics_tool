services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tft_analytics
      POSTGRES_USER: tft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tft -d tft_analytics"]
      interval: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: tft_analytics
      POSTGRES_USER: tft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./tft_analytics/mappings:/app/tft_analytics/mappings
      - ./data:/app/data

volumes:
  pgdata:
